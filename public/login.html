<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BinWatch Pro — Secure Login</title>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #F7F5F0;
      --header: #1A1A2E;
      --card-bg: #FFFFFF;
      --accent-green: #4ADE80;
      --accent-amber: #FBBF24;
      --accent-red: #EF4444;
      --text-main: #1A1A2E;
      --text-muted: #888780;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text-main);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .login-container {
      background: var(--card-bg);
      padding: 40px;
      border-radius: 24px;
      box-shadow: 0 10px 40px rgba(0,0,0,0.05);
      width: 100%;
      max-width: 400px;
      text-align: center;
    }

    .logo-wrap {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      margin-bottom: 30px;
    }

    .logo-icon {
      background: var(--accent-green);
      width: 40px;
      height: 40px;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .logo-text {
      font-family: 'Nunito', sans-serif;
      font-weight: 800;
      font-size: 24px;
      letter-spacing: -0.5px;
    }

    .input-group {
      margin-bottom: 20px;
      text-align: left;
    }

    .input-group label {
      display: block;
      font-size: 13px;
      font-weight: 700;
      color: var(--text-muted);
      text-transform: uppercase;
      margin-bottom: 8px;
    }

    .input-group input {
      width: 100%;
      padding: 14px;
      border: 2px solid #F1F5F9;
      border-radius: 12px;
      font-family: inherit;
      font-size: 16px;
      transition: 0.2s;
    }

    .input-group input:focus {
      border-color: var(--accent-green);
      outline: none;
    }

    .login-btn {
      width: 100%;
      background: var(--header);
      color: #fff;
      border: none;
      padding: 14px;
      border-radius: 12px;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      font-family: inherit;
      transition: all 0.2s;
      margin-top: 10px;
    }

    .login-btn:hover {
      background: #2D2D49;
      transform: translateY(-2px);
    }

    .error-msg {
      color: var(--accent-red);
      font-size: 14px;
      margin-top: 15px;
      display: none;
      font-weight: 600;
    }
  </style>
</head>
<body>

  <div class="login-container">
    <div class="logo-wrap">
      <div class="logo-icon">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#166534" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="3 6 5 6 21 6"></polyline>
          <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path>
          <line x1="10" y1="11" x2="10" y2="17"></line>
          <line x1="14" y1="11" x2="14" y2="17"></line>
        </svg>
      </div>
      <div class="logo-text">BinWatch Pro</div>
    </div>

    <form id="login-form">
      <div class="input-group">
        <label>Username</label>
        <input type="text" id="username" required placeholder="e.g. admin">
      </div>
      <div class="input-group">
        <label>Password</label>
        <input type="password" id="password" required placeholder="••••••••">
      </div>
      <button type="submit" class="login-btn">Secure Login</button>
      <div id="error-msg" class="error-msg">Invalid credentials.</div>
    </form>
  </div>

  <script>
    document.getElementById('login-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const username = document.getElementById('username').value;
      const password = document.getElementById('password').value;
      
      try {
        const res = await fetch('/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, password })
        });
        
        if (res.ok) {
          window.location.href = '/';
        } else {
          document.getElementById('error-msg').style.display = 'block';
        }
      } catch (err) {
        document.getElementById('error-msg').textContent = "Connection error.";
        document.getElementById('error-msg').style.display = 'block';
      }
    });
  </script>
</body>
</html>
